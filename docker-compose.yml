services:
  app:
    image: profile:production
    build:
      context: .
      args:
        # Docker build only: use local mock backend for Next.js prerendering.
        # Runtime still reads real values from .env via env_file below.
        USE_DOCKER_BUILD_MOCK_BACKEND: 'true'
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in .env}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?Set NEXT_PUBLIC_SITE_URL in .env}
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
